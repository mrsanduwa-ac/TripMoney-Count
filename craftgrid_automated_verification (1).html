<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRAFTGRID Automated Verification</title>
    <!-- Tesseract.js for OCR -->
    <script src="https://unpkg.com/tesseract.js@2.1.4/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0b0e;
            --card-bg: #15151e;
            --primary-red: #d32f2f;
            --primary-hover: #b71c1c;
            --success-green: #00e676;
            --text-main: #ffffff;
            --text-muted: #8a8a9d;
            --border-color: #2a2a3b;
            --accent-blue: #2979ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color); color: var(--text-main); padding: 20px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .app-container { width: 100%; max-width: 500px; animation: fadeIn 0.5s ease-out; }

        /* Header */
        header { text-align: center; margin-bottom: 30px; }
        .logo-container { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 5px; }
        .pulse-dot { width: 8px; height: 8px; background: var(--primary-red); border-radius: 50%; box-shadow: 0 0 12px var(--primary-red); animation: pulse 2s infinite; }
        header h1 { font-size: 26px; font-weight: 800; letter-spacing: 1px; }
        header h1 span { color: var(--primary-red); }
        header p { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }

        /* Card Layout */
        .card {
            background-color: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 16px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px;
        }

        /* Upload Area (Drag & Drop Enabled) */
        .upload-area {
            border: 2px dashed #3a3a4f; border-radius: 12px; padding: 40px 20px;
            text-align: center; cursor: pointer; position: relative; transition: all 0.3s ease;
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0) 100%);
        }
        .upload-area:hover, .upload-area.dragover { border-color: var(--primary-red); background-color: rgba(211, 47, 47, 0.05); }
        
        .upload-content { transition: opacity 0.3s; }
        .upload-icon { width: 40px; height: 40px; fill: var(--text-muted); margin-bottom: 15px; transition: fill 0.3s, transform 0.3s; }
        .upload-area:hover .upload-icon { fill: var(--primary-red); transform: translateY(-5px); }
        .upload-area h3 { font-size: 16px; font-weight: 600; margin-bottom: 5px; }
        .upload-area p { font-size: 13px; color: var(--text-muted); }

        #file-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; }

        /* Preview State */
        .preview-state {
            display: none; position: relative; border-radius: 12px; overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .preview-image { width: 100%; display: block; filter: brightness(0.6); transition: filter 0.3s; }
        
        /* Central Overlay on Preview */
        .preview-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85); padding: 15px 25px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px);
            display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 20;
        }
        .spinner { width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--primary-red); border-radius: 50%; animation: spin 1s linear infinite; }
        .overlay-text { font-size: 13px; font-weight: 500; color: #fff; white-space: nowrap; }

        /* Admin / Validation Result Panel */
        .result-panel { display: none; animation: slideUp 0.4s ease-out; }
        
        .data-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;
        }
        .data-box {
            background: rgba(0,0,0,0.4); border: 1px solid var(--border-color);
            padding: 15px; border-radius: 10px; text-align: center;
        }
        .data-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .data-value { font-size: 20px; font-weight: bold; color: var(--success-green); }
        .data-value.time { color: var(--accent-blue); }

        .raw-text-container {
            background: #000; border: 1px solid #222; border-radius: 8px;
            padding: 12px; height: 100px; overflow-y: auto; margin-bottom: 20px;
        }
        .raw-text { font-family: monospace; font-size: 11px; color: #5c5c70; white-space: pre-wrap; line-height: 1.4; }

        /* Action Buttons */
        .btn {
            width: 100%; padding: 15px; font-size: 15px; font-weight: 600; border: none; border-radius: 10px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-confirm { background-color: var(--success-green); color: #000; margin-bottom: 12px; }
        .btn-reject { background-color: transparent; color: var(--primary-red); border: 1px solid rgba(211,47,47,0.3); }

        /* Toast Notifications */
        .toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: #1a1a24; border-left: 4px solid var(--primary-red);
            padding: 15px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            display: flex; align-items: center; gap: 15px; z-index: 9999; transition: top 0.4s ease;
        }
        .toast.show { top: 20px; }
        .toast-content h4 { font-size: 14px; margin-bottom: 3px; }
        .toast-content p { font-size: 12px; color: var(--text-muted); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(211,47,47,0.6); } 70% { box-shadow: 0 0 0 8px rgba(211,47,47,0); } 100% { box-shadow: 0 0 0 0 rgba(211,47,47,0); } }
    </style>
</head>
<body>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <div id="toast-icon"></div>
        <div class="toast-content">
            <h4 id="toast-title">Title</h4>
            <p id="toast-desc">Description</p>
        </div>
    </div>

    <div class="app-container">
        <header>
            <div class="logo-container">
                <div class="pulse-dot"></div>
                <h1>CRAFT<span>GRID</span></h1>
            </div>
            <p>Automated Verification System</p>
        </header>

        <!-- Main Card -->
        <div class="card">
            
            <!-- Upload Area (Initial State) -->
            <div class="upload-area" id="drop-zone">
                <div class="upload-content" id="upload-content">
                    <svg class="upload-icon" viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
                    <h3>Upload Payment Receipt</h3>
                    <p>Drag & drop or click to browse</p>
                </div>
                <input type="file" id="file-input" accept="image/*">
            </div>

            <!-- Preview State (Image + Loading Overlay) -->
            <div class="preview-state" id="preview-state">
                <img id="preview-image" class="preview-image" src="" alt="Receipt Preview">
                <div class="preview-overlay" id="loading-overlay">
                    <div class="spinner"></div>
                    <span class="overlay-text">System Verifying...</span>
                </div>
            </div>

        </div>

        <!-- Result / Admin Panel -->
        <div class="card result-panel" id="result-panel">
            <h3 style="font-size:16px; margin-bottom:20px; border-bottom:1px solid var(--border-color); padding-bottom:10px;">Verification Result</h3>
            
            <div class="data-grid">
                <div class="data-box">
                    <div class="data-label">Detected Amount</div>
                    <div class="data-value" id="detected-amount">Rs. 0</div>
                </div>
                <div class="data-box">
                    <div class="data-label">Allocated Time</div>
                    <div class="data-value time" id="allocated-time">0 Mins</div>
                </div>
            </div>

            <div class="data-label">Raw System Extraction</div>
            <div class="raw-text-container">
                <div class="raw-text" id="raw-text"></div>
            </div>

            <button class="btn btn-confirm" onclick="confirmUnlock()">
                <svg style="width:20px; fill:#000" viewBox="0 0 24 24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg>
                Authorize & Unlock PC
            </button>
            <button class="btn btn-reject" onclick="resetSystem()">
                <svg style="width:20px; fill:currentColor" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                Reject / Scan Again
            </button>
        </div>

    </div>

    <!-- ========================================================================= -->
    <!-- 👇👇👇 FIREBASE සැකසුම් (මේවා ඔබේ Firebase එකෙන් අරන් මෙතනට දාන්න) 👇👇👇 -->
    <!-- ========================================================================= -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // මෙන්න මේ ටික සම්පූර්ණයෙන්ම ඔබේ Firebase project settings වලින් අරන් වෙනස් කරන්න.
        const firebaseConfig = {
  apiKey: "AIzaSyBlDfy2UJ846qeYI3GARwPVn1IOauofy_c",
  authDomain: "craftgrid-gaming.firebaseapp.com",
  databaseURL: "https://craftgrid-gaming-default-rtdb.firebaseio.com",
  projectId: "craftgrid-gaming",
  storageBucket: "craftgrid-gaming.firebasestorage.app",
  messagingSenderId: "375782367184",
  appId: "1:375782367184:web:0a72ca3b715a2c7f80a3d5",
  measurementId: "G-ZZW4SGKHHT"
};

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // මේ function එකෙන් තමයි PC එකට සිග්නල් එක යවන්නේ (මෙය පහල script එකට පාවිච්චි කරන්න පුළුවන් වෙන්න window එකට attach කරනවා)
        window.sendFirebaseUnlockSignal = function(minutes) {
            return set(ref(db, 'pc1_status'), {
                status: 'unlocked',
                time_added: minutes,
                timestamp: Date.now()
            });
        };
    </script>
    <!-- 👆👆👆 ================================================================== 👆👆👆 -->

    <script>
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const uploadContent = document.getElementById('upload-content');
        const previewState = document.getElementById('preview-state');
        const previewImage = document.getElementById('preview-image');
        const loadingOverlay = document.getElementById('loading-overlay');
        const resultPanel = document.getElementById('result-panel');
        
        // Data display elements
        const amountDisplay = document.getElementById('detected-amount');
        const timeDisplay = document.getElementById('allocated-time');
        const rawTextDisplay = document.getElementById('raw-text');

        // Payment Logic (Time Calculation)
        // Rate: 500 Rs = 30 mins -> 16.66 Rs per minute.
        const PRICE_PER_MINUTE = 500 / 30; 

        const validKeywords = ["lankaqr", "transaction", "amount", "successful", "lkr", "boc", "people", "sampath", "commercial", "hnb"];

        // Toast SVGs
        const svgSuccess = `<svg style="width:24px; fill:var(--success-green)" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`;
        const svgError = `<svg style="width:24px; fill:var(--primary-red)" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>`;
        const svgInfo = `<svg style="width:24px; fill:var(--accent-blue)" viewBox="0 0 24 24"><path d="M11 15h2v2h-2zm0-8h2v6h-2zm1-5C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>`;

        function showToast(title, desc, type) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-desc').innerText = desc;
            
            let icon = svgInfo;
            let color = 'var(--accent-blue)';
            if(type === 'success') { icon = svgSuccess; color = 'var(--success-green)'; }
            else if(type === 'error') { icon = svgError; color = 'var(--primary-red)'; }
            
            document.getElementById('toast-icon').innerHTML = icon;
            toast.style.borderLeftColor = color;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        // --- Drag and Drop Handlers ---
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
            dropZone.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); }, false);
        });
        
        ['dragenter', 'dragover'].forEach(evt => {
            dropZone.addEventListener(evt, () => dropZone.classList.add('dragover'), false);
        });
        
        ['dragleave', 'drop'].forEach(evt => {
            dropZone.addEventListener(evt, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', e => {
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) handleFile(file);
        }, false);

        fileInput.addEventListener('change', e => {
            if(e.target.files[0]) handleFile(e.target.files[0]);
        });

        // --- Main Processing Logic ---
        function handleFile(file) {
            // UI Transition: Show Image & Loading Overlay
            const reader = new FileReader();
            reader.onload = e => {
                previewImage.src = e.target.result;
                dropZone.style.display = 'none';
                previewState.style.display = 'block';
                resultPanel.style.display = 'none';
            };
            reader.readAsDataURL(file);

            // Execute OCR Verification
            Tesseract.recognize(file, 'eng')
                .then(({ data: { text } }) => {
                    const lowerText = text.toLowerCase();
                    rawTextDisplay.innerText = text; // Show raw data to admin

                    // 1. Validate if it's a Bank Receipt
                    let isReceipt = validKeywords.some(kw => lowerText.includes(kw));

                    if (isReceipt) {
                        // 2. Extract Amount
                        let amount = extractAmount(lowerText);
                        
                        if(amount > 0) {
                            // Calculate Time
                            let minutes = Math.floor(amount / PRICE_PER_MINUTE);
                            
                            // UI Updates
                            amountDisplay.innerText = `Rs. ${amount}`;
                            timeDisplay.innerText = `${minutes} Mins`;
                            
                            loadingOverlay.style.display = 'none';
                            previewImage.style.filter = 'brightness(1)'; // Remove dim
                            resultPanel.style.display = 'block';
                            
                            showToast('Verification Complete', 'Valid payment structure detected.', 'success');
                        } else {
                            failValidation("System could not clearly read the amount.");
                        }
                    } else {
                        failValidation("Invalid image format. Not recognized as a bank receipt.");
                    }
                })
                .catch(err => {
                    failValidation("System error during image processing.");
                    console.error(err);
                });
        }

        function failValidation(message) {
            loadingOverlay.style.display = 'none';
            showToast('Verification Failed', message, 'error');
            setTimeout(resetSystem, 2500); // Auto reset on failure
        }

        // --- Smart Amount Extraction Logic ---
        function extractAmount(text) {
            // Regex to find patterns like "Rs. 500", "LKR 1,200.00", "Amount 500"
            // Removes commas and takes the numeric value
            const amountRegex = /(?:rs\.?|lkr|amount)\s*[:.-]?\s*([0-9]{1,3}(?:,[0-9]{3})*(?:\.[0-9]{2})?)/g;
            let match;
            let amounts = [];
            
            while ((match = amountRegex.exec(text)) !== null) {
                // Remove commas and convert to float
                let val = parseFloat(match[1].replace(/,/g, ''));
                if(!isNaN(val)) amounts.push(val);
            }

            // Fallback: If strict regex fails, look for isolated numbers ending in .00
            if(amounts.length === 0) {
                const numRegex = /([0-9]{1,3}(?:,[0-9]{3})*\.00)/g;
                while ((match = numRegex.exec(text)) !== null) {
                    let val = parseFloat(match[1].replace(/,/g, ''));
                    if(!isNaN(val)) amounts.push(val);
                }
            }

            // Return the highest found amount (usually the total)
            return amounts.length > 0 ? Math.max(...amounts) : 0;
        }

        // --- Action Buttons (Updated to send Firebase signal) ---
        function confirmUnlock() {
            // ඩිස්ප්ලේ එකේ තියෙන ගානෙන් (උදා: "30 Mins") ඉලක්කම විතරක් ගන්නවා
            const timeText = timeDisplay.innerText;
            const minutes = parseInt(timeText.split(' ')[0]);

            showToast('Sending Signal...', `Authorizing PC via Firebase...`, 'info');

            // Firebase function එක කෝල් කරනවා
            if(window.sendFirebaseUnlockSignal) {
                window.sendFirebaseUnlockSignal(minutes)
                    .then(() => {
                        showToast('System Authorized', `PC successfully unlocked for ${minutes} mins.`, 'success');
                        setTimeout(resetSystem, 3000);
                    })
                    .catch((error) => {
                        console.error("Firebase Error: ", error);
                        showToast('Connection Error', 'Failed to connect to Firebase database.', 'error');
                    });
            } else {
                showToast('Configuration Error', 'Firebase keys are missing in the code!', 'error');
            }
        }

        function resetSystem() {
            fileInput.value = '';
            dropZone.style.display = 'block';
            previewState.style.display = 'none';
            resultPanel.style.display = 'none';
            loadingOverlay.style.display = 'flex'; // Reset loader for next time
            previewImage.style.filter = 'brightness(0.6)';
        }
    </script>
</body>
</html>
