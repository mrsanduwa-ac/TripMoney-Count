<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TripTracker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Premium Core Colors */
            --primary: #0f172a;
            --primary-light: #1e293b;
            --accent: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.4);
            
            --surface: rgba(255, 255, 255, 0.85);
            --surface-solid: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --border: rgba(15, 23, 42, 0.08);
            
            --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.04);
            --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.08);
            --shadow-lg: 0 24px 48px rgba(15, 23, 42, 0.12);
            --radius-md: 16px;
            --radius-lg: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f8fafc;
            color: var(--text-main);
            overflow: hidden;
            height: 100dvh;
            display: flex; justify-content: center; align-items: center;
        }

        /* PREMIUM DYNAMIC MESH BACKGROUND (Subtle & Professional) */
        .mesh-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; overflow: hidden;
            background-color: #f8fafc;
            transition: background-color 2s ease;
        }
        
        .mesh-blob {
            position: absolute; filter: blur(80px); opacity: 0.6;
            border-radius: 50%; animation: floatBg 20s infinite alternate ease-in-out;
            transition: background 2s ease;
        }
        .blob-1 { width: 300px; height: 300px; top: -100px; left: -100px; }
        .blob-2 { width: 400px; height: 400px; bottom: -150px; right: -100px; animation-delay: -5s; }

        @keyframes floatBg {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 80px) scale(1.1); }
        }

        /* Time of Day Themes */
        .theme-morning .blob-1 { background: #bae6fd; } /* Light Blue */
        .theme-morning .blob-2 { background: #e0f2fe; }
        
        .theme-noon .blob-1 { background: #bfdbfe; } /* Blue */
        .theme-noon .blob-2 { background: #93c5fd; }
        
        .theme-evening .blob-1 { background: #fed7aa; } /* Peach/Orange */
        .theme-evening .blob-2 { background: #ffedd5; }
        
        .theme-night { background-color: #0f172a; } /* Dark */
        .theme-night .blob-1 { background: #1e293b; opacity: 0.8; filter: blur(100px); }
        .theme-night .blob-2 { background: #334155; opacity: 0.8; filter: blur(100px); }

        /* App Container */
        .app-container {
            width: 100%; max-width: 420px; height: 100dvh;
            background: transparent;
            display: flex; flex-direction: column;
            position: relative; z-index: 10;
            box-shadow: 0 0 50px rgba(0,0,0,0.05);
        }

        /* Glass Header */
        header {
            padding: 24px 24px 16px 24px;
            display: flex; justify-content: space-between; align-items: center;
            background: transparent;
            z-index: 20;
        }
        header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.5px; color: var(--primary); transition: color 0.3s; }
        .theme-night header h1 { color: #f8fafc; }

        .sync-badge {
            display: flex; align-items: center; gap: 6px;
            background: var(--surface); backdrop-filter: blur(12px);
            padding: 8px 14px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 600; color: var(--primary);
            cursor: pointer; border: 1px solid var(--border);
            box-shadow: var(--shadow-sm); transition: all 0.2s;
        }
        .theme-night .sync-badge { background: rgba(30,41,59,0.7); color: #fff; border-color: rgba(255,255,255,0.1); }
        .sync-badge:active { transform: scale(0.95); }
        .sync-badge.syncing svg { animation: spin 1s linear infinite; }
        .sync-badge.done { background: var(--success); color: white; border-color: var(--success); }
        .sync-badge.error { background: var(--danger); color: white; border-color: var(--danger); }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Budget Card (Premium Look) */
        .budget-wrapper {
            padding: 20px 24px; background: var(--surface); backdrop-filter: blur(20px);
            border-radius: var(--radius-lg); margin: 0 20px 16px 20px; display: none;
            box-shadow: var(--shadow-md); border: 1px solid var(--border);
            animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .theme-night .budget-wrapper { background: rgba(30,41,59,0.7); border-color: rgba(255,255,255,0.05); }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .budget-header { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 4px; }
        .theme-night .budget-header { color: #94a3b8; }
        .budget-amount { font-size: 1.75rem; font-weight: 700; color: var(--primary); margin-bottom: 16px; letter-spacing: -0.5px; }
        .theme-night .budget-amount { color: #fff; }
        
        .budget-stats { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 8px; font-weight: 500; }
        .budget-stats .spent { color: var(--text-muted); }
        .theme-night .budget-stats .spent { color: #94a3b8; }
        .budget-stats .remaining { color: var(--accent); font-weight: 600; }
        
        .progress-bg { width: 100%; height: 6px; background: rgba(15,23,42,0.05); border-radius: 6px; overflow: hidden; }
        .theme-night .progress-bg { background: rgba(255,255,255,0.1); }
        .progress-fill { height: 100%; width: 0%; background: var(--accent); border-radius: 6px; transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1); }

        /* Main Content Views */
        .content-view {
            flex: 1; overflow-y: auto; padding: 10px 20px 120px 20px; display: none;
            /* Scrollbar hidden */
            -ms-overflow-style: none; scrollbar-width: none;
        }
        .content-view::-webkit-scrollbar { display: none; }
        .content-view.active { display: block; animation: fadeScale 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeScale { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .section-title { font-size: 1.1rem; font-weight: 700; color: var(--primary); margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        .theme-night .section-title { color: #fff; }
        .undo-btn { font-size: 0.75rem; color: var(--accent); font-weight: 600; cursor: pointer; padding: 6px 12px; background: rgba(37,99,235,0.1); border-radius: 20px; display: none; transition: 0.2s;}
        .undo-btn:active { transform: scale(0.95); }

        /* Modern List Items */
        .item-row {
            background: var(--surface-solid);
            padding: 18px 20px; border-radius: var(--radius-md); margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--shadow-sm); border: 1px solid var(--border);
            cursor: pointer; transition: all 0.2s ease;
        }
        .theme-night .item-row { background: #1e293b; border-color: rgba(255,255,255,0.05); }
        .item-row:active { transform: scale(0.98); box-shadow: none; }
        
        .item-row.done { opacity: 0.6; border-left: 4px solid var(--success); }
        .item-row.done .item-title { text-decoration: line-through; color: var(--text-muted); }
        .item-row.not-found { border-left: 4px solid var(--danger); background: #fef2f2; }
        .theme-night .item-row.not-found { background: rgba(239, 68, 68, 0.1); }
        
        .item-info { display: flex; flex-direction: column; gap: 4px; }
        .item-title { font-weight: 600; font-size: 0.95rem; color: var(--text-main); }
        .theme-night .item-title { color: #fff; }
        .item-meta { font-size: 0.75rem; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
        .theme-night .item-meta { color: #94a3b8; }
        .item-price { font-weight: 700; color: var(--primary); font-size: 1rem; }
        .theme-night .item-price { color: #fff; }

        /* Floating Action Button (FAB) */
        .fab-add {
            position: absolute; bottom: 100px; right: 24px;
            width: 56px; height: 56px; background: var(--primary); color: white;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 24px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.3); z-index: 20;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); cursor: pointer;
        }
        .theme-night .fab-add { background: var(--accent); box-shadow: 0 8px 24px var(--accent-glow); }
        .fab-add:active { transform: scale(0.9); }

        /* Sleek Footer Navigation */
        footer {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 80px;
            background: var(--surface); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 30; padding-bottom: env(safe-area-inset-bottom);
        }
        .theme-night footer { background: rgba(15,23,42,0.85); border-color: rgba(255,255,255,0.05); }
        
        .nav-tab {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-muted); font-size: 0.7rem; font-weight: 600; width: 70px; height: 100%;
            transition: color 0.3s; cursor: pointer;
        }
        .theme-night .nav-tab { color: #64748b; }
        .nav-tab.active { color: var(--primary); }
        .theme-night .nav-tab.active { color: #fff; }
        .nav-tab svg { width: 22px; height: 22px; margin-bottom: 4px; fill: currentColor; transition: transform 0.3s; }
        .nav-tab.active svg { transform: translateY(-2px); }

        /* Center Action Button (Start/Custom Expense) */
        .center-btn-wrapper { position: relative; width: 64px; height: 64px; transform: translateY(-24px); }
        .center-action-btn {
            width: 100%; height: 100%; background: var(--surface-solid);
            border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--primary); box-shadow: var(--shadow-md);
            border: 1px solid var(--border); transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); cursor: pointer;
        }
        .theme-night .center-action-btn { background: #1e293b; color: #fff; border-color: rgba(255,255,255,0.1); }
        .center-action-btn:active { transform: scale(0.9); }
        .center-action-btn.active-state { background: var(--primary); color: #fff; border-color: transparent; }
        .theme-night .center-action-btn.active-state { background: var(--accent); }
        .center-action-btn span { font-weight: 700; font-size: 0.75rem; letter-spacing: 0.5px; }
        .center-action-btn svg { width: 24px; height: 24px; display: none; fill: white; }

        /* --- PREMIUM MODALS & POPUPS --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); z-index: 100;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        
        /* Center Modal */
        .modal-card {
            background: var(--surface-solid); width: 90%; max-width: 340px; 
            border-radius: var(--radius-lg); padding: 24px;
            transform: scale(0.95) translateY(10px); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: var(--shadow-lg); border: 1px solid var(--border);
        }
        .theme-night .modal-card { background: #1e293b; border-color: rgba(255,255,255,0.1); }
        .modal-overlay.open .modal-card { transform: scale(1) translateY(0); }
        
        .modal-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 20px; color: var(--primary); text-align: center; }
        .theme-night .modal-title { color: #fff; }
        .modal-message { font-size: 0.9rem; color: var(--text-muted); text-align: center; margin-bottom: 24px; line-height: 1.5; }
        .theme-night .modal-message { color: #94a3b8; }
        
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
        .theme-night .form-label { color: #94a3b8; }
        .form-control { 
            width: 100%; padding: 14px 16px; background: #f8fafc; 
            border: 1px solid #e2e8f0; border-radius: 12px; font-size: 1rem; color: var(--text-main);
            outline: none; transition: all 0.2s; font-weight: 500;
        }
        .theme-night .form-control { background: #0f172a; border-color: rgba(255,255,255,0.1); color: #fff; }
        .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); background: var(--surface-solid); }
        .theme-night .form-control:focus { background: #0f172a; }
        
        .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
        .btn { 
            flex: 1; padding: 14px; border-radius: 12px; font-weight: 600; font-size: 0.95rem; 
            border: none; cursor: pointer; transition: all 0.2s; display: flex; justify-content: center; align-items: center;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary); color: white; }
        .theme-night .btn-primary { background: var(--accent); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: transparent; color: var(--text-main); border: 1px solid #e2e8f0; }
        .theme-night .btn-outline { color: #fff; border-color: rgba(255,255,255,0.1); }

        /* Bottom Sheet Modal */
        .bottom-sheet {
            position: absolute; bottom: 0; background: var(--surface-solid); width: 100%; max-width: 450px;
            border-radius: 24px 24px 0 0; padding: 24px; transform: translateY(100%); 
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
        }
        .theme-night .bottom-sheet { background: #1e293b; border-top: 1px solid rgba(255,255,255,0.05); }
        .modal-overlay.open .bottom-sheet { transform: translateY(0); }
        
        .sheet-opt { 
            padding: 16px; border-radius: 14px; margin-bottom: 12px; font-weight: 600; font-size: 0.95rem;
            display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.2s;
            border: 1px solid transparent; background: #f8fafc; color: var(--text-main);
        }
        .theme-night .sheet-opt { background: #0f172a; color: #fff; border-color: rgba(255,255,255,0.05); }
        .sheet-opt:active { transform: scale(0.98); }
        .sheet-opt.opt-done { color: var(--success); background: #ecfdf5; border-color: #d1fae5; }
        .theme-night .sheet-opt.opt-done { background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.2); }
        .sheet-opt.opt-fail { color: var(--danger); background: #fef2f2; border-color: #fee2e2; }
        .theme-night .sheet-opt.opt-fail { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); }
        
        /* Custom Toast Notification */
        .toast-container {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: var(--surface-solid); color: var(--primary); font-weight: 600; font-size: 0.9rem;
            padding: 12px 24px; border-radius: 30px; box-shadow: var(--shadow-md);
            display: flex; align-items: center; gap: 8px; z-index: 200; border: 1px solid var(--border);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease; opacity: 0;
        }
        .theme-night .toast-container { background: #1e293b; color: #fff; border-color: rgba(255,255,255,0.1); }
        .toast-container.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast-icon { width: 18px; height: 18px; }
        .toast-success .toast-icon { color: var(--success); }
        .toast-warning .toast-icon { color: var(--warning); }
        .toast-error .toast-icon { color: var(--danger); }

        .empty-state { text-align: center; color: var(--text-muted); padding: 60px 20px; font-size: 0.95rem; font-weight: 500; }
        .theme-night .empty-state { color: #64748b; }
    </style>
</head>
<body>

    <!-- Professional Dynamic Mesh Background -->
    <div class="mesh-bg" id="dynamicBg">
        <div class="mesh-blob blob-1"></div>
        <div class="mesh-blob blob-2"></div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container" id="toast">
        <svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path id="toastIconPath" d=""/></svg>
        <span id="toastMsg">Notification</span>
    </div>

    <!-- App Container -->
    <div class="app-container">
        
        <!-- Header -->
        <header>
            <h1>TripTracker Pro</h1>
            <div class="sync-badge" id="syncBadge" onclick="syncWithCloud()">
                <svg id="syncIconSvg" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"/></svg>
                <span id="syncText">Sync</span>
            </div>
        </header>

        <!-- Premium Budget Card -->
        <div class="budget-wrapper" id="budgetBar">
            <div class="budget-header">Available Balance</div>
            <div class="budget-amount" id="remLbl">Rs. 0</div>
            <div class="budget-stats">
                <span class="spent">Spent: <span id="spentLbl">Rs. 0</span></span>
                <span class="spent">Total: <span id="totalLbl">Rs. 0</span></span>
            </div>
            <div class="progress-bg"><div class="progress-fill" id="progFill"></div></div>
        </div>

        <!-- VIEW: List -->
        <div class="content-view active" id="view-list">
            <div class="section-title">
                <span>Purchase List</span>
                <span class="undo-btn" id="undoBtn" onclick="undoAction()">↩ Undo</span>
            </div>
            <div id="listContainer"></div>
        </div>

        <!-- VIEW: History -->
        <div class="content-view" id="view-history">
            <div class="section-title">Trip History</div>
            <div id="historyContainer"></div>
        </div>

        <!-- Floating Add Item Button -->
        <div class="fab-add" id="fabAdd" onclick="openModal('addModal')">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </div>

        <!-- Sleek Footer Navigation -->
        <footer>
            <div class="nav-tab active" onclick="switchTab('list')">
                <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
                <span>Items</span>
            </div>
            
            <div class="center-btn-wrapper">
                <div class="center-action-btn" id="mainBtn" onclick="handleMainAction()">
                    <span id="mainBtnTxt">START</span>
                    <svg id="mainBtnIco" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                </div>
            </div>
            
            <div class="nav-tab" onclick="switchTab('history')">
                <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 10h2v7H7zm4-3h2v10h-2zm4 6h2v4h-2z"/></svg>
                <span>History</span>
            </div>
        </footer>
    </div>

    <!-- PREMIUM MODALS -->
    
    <!-- Add Item Modal -->
    <div class="modal-overlay" id="addModal">
        <div class="modal-card">
            <h3 class="modal-title">Add New Item</h3>
            <div class="form-group">
                <label class="form-label">Item Name</label>
                <input type="text" id="addInp" class="form-control" placeholder="e.g. Mobile Display, Cables...">
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeModal('addModal')">Cancel</button>
                <button class="btn btn-primary" onclick="addItem()">Add to List</button>
            </div>
        </div>
    </div>

    <!-- Start Trip Modal -->
    <div class="modal-overlay" id="startModal">
        <div class="modal-card">
            <h3 class="modal-title">Start Journey</h3>
            <div class="form-group">
                <label class="form-label">Total Budget Available</label>
                <input type="number" id="startInp" class="form-control" placeholder="Amount in Rs.">
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeModal('startModal')">Cancel</button>
                <button class="btn btn-primary" onclick="startTrip()">Begin Trip</button>
            </div>
        </div>
    </div>

    <!-- Add Expense Modal (For Items & Custom) -->
    <div class="modal-overlay" id="expModal">
        <div class="modal-card">
            <h3 class="modal-title" id="expTitle">Log Expense</h3>
            <div class="form-group" id="expRsnGroup" style="display:none;">
                <label class="form-label">Expense Reason</label>
                <input type="text" id="expRsn" class="form-control" placeholder="e.g. Tuk Tuk, Lunch...">
            </div>
            <div class="form-group">
                <label class="form-label">Amount Spent</label>
                <input type="number" id="expAmt" class="form-control" placeholder="Amount in Rs.">
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeModal('expModal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveExpense()">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Warning / Custom Alert Modal -->
    <div class="modal-overlay" id="alertModal">
        <div class="modal-card">
            <h3 class="modal-title" id="alertTitle">Alert</h3>
            <p class="modal-message" id="alertMsg">Message goes here.</p>
            <div class="modal-actions" id="alertActions">
                <!-- Injected dynamically -->
            </div>
        </div>
    </div>

    <!-- Bottom Sheet Item Options -->
    <div class="modal-overlay" id="sheetModal" onclick="closeModal('sheetModal')">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <h3 class="modal-title" id="sheetTitle" style="margin-bottom:24px;">Item Options</h3>
            <div class="sheet-opt opt-done" onclick="handleItemAction('done')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                Mark as Purchased
            </div>
            <div class="sheet-opt opt-fail" onclick="handleItemAction('notfound')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                Mark Not Found
            </div>
            <div class="sheet-opt" onclick="closeModal('sheetModal')">
                Cancel
            </div>
        </div>
    </div>

    <script>
        /* =======================================================
           GOOGLE APPS SCRIPT URL HERE
           ======================================================= */
        const APP_URL = "https://script.google.com/macros/s/AKfycbzYCrEDOV_W9ZoMPGOjF9u3qMvVeeqyKDV7Irkm0us1VaW2QjRTduEsUvdJa8EhQQam4A/exec";

        let state = { started: false, budget: 0, spent: 0, items: [], history: [], lastSync: 0, lastAction: null };
        let activeId = null; let isCustom = false; let pressTimer;

        // --- THEME & UI LOGIC ---
        function updateTheme() {
            const hr = new Date().getHours();
            const body = document.body;
            body.className = ''; // reset
            if(hr >= 6 && hr < 11) body.classList.add('theme-morning');
            else if(hr >= 11 && hr < 16) body.classList.add('theme-noon');
            else if(hr >= 16 && hr < 19) body.classList.add('theme-evening');
            else body.classList.add('theme-night');
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.className = `toast-container toast-${type}`;
            
            const path = document.getElementById('toastIconPath');
            if(type === 'success') path.setAttribute('d', 'M20 6L9 17l-5-5');
            else if(type === 'warning') path.setAttribute('d', 'M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z');
            else path.setAttribute('d', 'M18 6L6 18M6 6l12 12'); // error

            // Trigger reflow for animation
            void toast.offsetWidth;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function showAlert(title, msg, type = 'alert', onConfirm = null) {
            document.getElementById('alertTitle').innerText = title;
            document.getElementById('alertMsg').innerText = msg;
            const actions = document.getElementById('alertActions');
            actions.innerHTML = '';

            if(type === 'confirm') {
                actions.innerHTML = `
                    <button class="btn btn-outline" onclick="closeModal('alertModal')">Cancel</button>
                    <button class="btn btn-danger" id="confirmBtn">Confirm</button>
                `;
                document.getElementById('confirmBtn').onclick = () => { closeModal('alertModal'); if(onConfirm) onConfirm(); };
            } else {
                actions.innerHTML = `<button class="btn btn-primary" onclick="closeModal('alertModal')">Got it</button>`;
            }
            openModal('alertModal');
        }

        // --- CORE APP LOGIC ---
        window.onload = () => {
            updateTheme(); setInterval(updateTheme, 60000); // Check time
            
            if(localStorage.getItem('clmb_pro_data')) {
                state = JSON.parse(localStorage.getItem('clmb_pro_data'));
            }
            render();
            
            const mBtn = document.getElementById('mainBtn');
            mBtn.addEventListener('touchstart', pressStart, {passive: true});
            mBtn.addEventListener('touchend', pressEnd);
            mBtn.addEventListener('mousedown', pressStart);
            mBtn.addEventListener('mouseup', pressEnd);
            mBtn.addEventListener('mouseleave', pressEnd);
        }

        function saveLocal() {
            state.lastSync = Date.now();
            localStorage.setItem('clmb_pro_data', JSON.stringify(state));
            render(); bgSync();
        }

        function render() {
            const bb = document.getElementById('budgetBar');
            if(state.started) {
                bb.style.display = 'block';
                const rem = state.budget - state.spent;
                document.getElementById('spentLbl').innerText = `Rs. ${state.spent.toLocaleString()}`;
                document.getElementById('totalLbl').innerText = `Rs. ${state.budget.toLocaleString()}`;
                document.getElementById('remLbl').innerText = `Rs. ${rem.toLocaleString()}`;
                document.getElementById('progFill').style.width = Math.max(0, (rem/state.budget)*100) + '%';
                
                document.getElementById('mainBtnTxt').style.display = 'none';
                document.getElementById('mainBtnIco').style.display = 'block';
                document.getElementById('mainBtn').classList.add('active-state');
            } else {
                bb.style.display = 'none';
                document.getElementById('mainBtnTxt').style.display = 'block';
                document.getElementById('mainBtnIco').style.display = 'none';
                document.getElementById('mainBtn').classList.remove('active-state');
            }

            const lc = document.getElementById('listContainer');
            lc.innerHTML = '';
            
            // Sort: pending first, then not-found, then done
            const sortedList = [...state.items].sort((a,b) => {
                const w = { 'pending':1, 'not-found':2, 'done':3 };
                return w[a.status] - w[b.status];
            });

            sortedList.forEach(i => {
                let statusIco = i.status === 'done' ? '✓ ' : i.status === 'not-found' ? '✕ ' : '';
                lc.innerHTML += `
                    <div class="item-row ${i.status}" onclick="openItem(${i.id})">
                        <div class="item-info">
                            <div class="item-title">${i.title}</div>
                            <div class="item-meta">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                                ${i.time ? i.time : 'Pending'}
                            </div>
                        </div>
                        ${i.price ? `<div class="item-price">Rs. ${i.price.toLocaleString()}</div>` : ''}
                    </div>`;
            });
            if(!sortedList.length) lc.innerHTML = '<div class="empty-state">Your list is empty.<br>Tap the + button to add items.</div>';

            document.getElementById('undoBtn').style.display = state.lastAction ? 'block' : 'none';

            const hc = document.getElementById('historyContainer');
            hc.innerHTML = '';
            [...state.history].reverse().forEach(h => {
                hc.innerHTML += `
                    <div class="item-row" style="flex-direction:column; align-items:flex-start;">
                        <div style="width:100%; display:flex; justify-content:space-between; margin-bottom:8px;">
                            <span style="font-weight:600; font-size:0.9rem;">📅 ${h.date}</span>
                            <span style="color:var(--success); font-weight:700;">Rs. ${(h.budget - h.spent).toLocaleString()}</span>
                        </div>
                        <div style="font-size:0.75rem; color:var(--text-muted); display:flex; justify-content:space-between; width:100%;">
                            <span>Spent: Rs. ${h.spent.toLocaleString()}</span>
                            <span>Items: ${h.items}</span>
                        </div>
                    </div>`;
            });
            if(!state.history.length) hc.innerHTML = '<div class="empty-state">No trip history available.</div>';
        }

        // --- INTERACTIONS ---
        function switchTab(v) {
            document.querySelectorAll('.content-view').forEach(e=>e.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(e=>e.classList.remove('active'));
            document.getElementById('view-'+v).classList.add('active');
            document.querySelectorAll('.nav-tab')[v==='list'?0:1].classList.add('active');
            document.getElementById('fabAdd').style.display = v==='list'?'flex':'none';
        }

        function openModal(id) { document.getElementById(id).classList.add('open'); }
        function closeModal(id) { document.getElementById(id).classList.remove('open'); }

        function addItem() {
            const v = document.getElementById('addInp').value;
            if(!v) return;
            state.items.push({ id:Date.now(), title:v, status:'pending', price:0, time:'' });
            document.getElementById('addInp').value = ''; 
            closeModal('addModal'); saveLocal();
            showToast('Item added to list');
        }

        function handleMainAction() {
            if(!state.started) openModal('startModal');
            else {
                isCustom = true;
                document.getElementById('expTitle').innerText = 'Log Extra Expense';
                document.getElementById('expRsnGroup').style.display = 'block';
                document.getElementById('expAmt').value = ''; document.getElementById('expRsn').value = '';
                openModal('expModal');
            }
        }

        function startTrip() {
            const b = parseInt(document.getElementById('startInp').value);
            if(!b || b <= 0) { showAlert("Error", "Please enter a valid budget amount."); return; }
            state.budget = b; state.spent = 0; state.started = true;
            closeModal('startModal'); saveLocal();
            showToast('Trip successfully started!', 'success');
        }

        function openItem(id) {
            activeId = id; const i = state.items.find(x=>x.id==id);
            document.getElementById('sheetTitle').innerText = i.title;
            openModal('sheetModal');
        }

        function handleItemAction(act) {
            closeModal('sheetModal');
            if(act==='done') {
                isCustom = false;
                document.getElementById('expTitle').innerText = 'Enter Amount';
                document.getElementById('expRsnGroup').style.display = 'none';
                document.getElementById('expAmt').value = '';
                openModal('expModal');
            } else {
                state.lastAction = JSON.parse(JSON.stringify(state)); // Backup for undo
                state.items.find(x=>x.id==activeId).status = 'not-found';
                saveLocal(); showToast('Marked as Not Found', 'warning');
            }
        }

        function saveExpense() {
            const amt = parseInt(document.getElementById('expAmt').value);
            if(!amt || amt <= 0) return;
            
            state.lastAction = JSON.parse(JSON.stringify(state)); // Backup for undo
            state.spent += amt;
            let timeStr = new Date().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});

            if(!isCustom) {
                let itm = state.items.find(x=>x.id==activeId);
                itm.status = 'done'; itm.price = amt; itm.time = timeStr;
                showToast(`Saved Rs. ${amt} for ${itm.title}`);
            } else {
                let rsn = document.getElementById('expRsn').value || 'Extra Expense';
                state.items.push({ id:Date.now(), title:rsn, status:'done', price:amt, time:timeStr });
                showToast(`Logged Rs. ${amt} for ${rsn}`);
            }
            closeModal('expModal'); saveLocal();
        }

        function undoAction() {
            if(state.lastAction) {
                state = JSON.parse(JSON.stringify(state.lastAction));
                state.lastAction = null;
                saveLocal(); showToast('Action reversed', 'success');
            }
        }

        // Long Press Logic to End Trip
        function pressStart(e) { 
            if(!state.started) return; 
            pressTimer = setTimeout(triggerEndTrip, 1000); 
        }
        function pressEnd() { clearTimeout(pressTimer); }
        
        function triggerEndTrip() {
            showAlert("End Trip", "Are you sure you want to finalize this trip? The summary will be saved to History.", "confirm", finalizeTrip);
        }

        function finalizeTrip() {
            let dStr = new Date().toLocaleDateString('en-GB');
            let doneCount = state.items.filter(x=>x.status=='done').length;
            
            let tripData = {
                date: dStr, budget: state.budget, spent: state.spent, items: doneCount,
                fullData: state.items.filter(x=>x.status=='done' || x.status=='not-found')
            };
            state.history.push(tripData);
            
            // Sync specific end action
            if(APP_URL.includes("script.google")) {
                fetch(APP_URL, { method:'POST', mode:'no-cors', body: JSON.stringify({action:'end', data:tripData}) });
            }

            state.started = false; state.lastAction = null;
            state.items = state.items.filter(x=>x.status!=='done'); 
            saveLocal(); 
            showToast('Trip Finalized and Saved!', 'success');
        }

        // --- SYNC LOGIC ---
        async function syncWithCloud(silent = false) {
            if(!APP_URL.includes("script.google")) {
                if(!silent) showAlert("Setup Required", "Please add your Google Apps Script Web App URL in the code.");
                return;
            }
            const b = document.getElementById('syncBadge'); 
            const txt = document.getElementById('syncText');
            
            if(!silent) { b.className = 'sync-badge syncing'; txt.innerText = 'Syncing...'; }
            
            try {
                let res = await fetch(APP_URL);
                let json = await res.json();
                if(json.state && json.state.lastSync > state.lastSync) {
                    state = json.state; localStorage.setItem('clmb_pro_data', JSON.stringify(state)); render();
                } else if (!json.state || state.lastSync > json.state.lastSync) { 
                    await bgSync(); 
                }
                
                if(!silent) {
                    b.className = 'sync-badge done'; txt.innerText = 'Done';
                    setTimeout(()=>{ b.className='sync-badge'; txt.innerText='Sync'; }, 2000);
                }
            } catch(e) { 
                if(!silent) {
                    b.className = 'sync-badge error'; txt.innerText = 'Failed';
                    setTimeout(()=>{ b.className='sync-badge'; txt.innerText='Sync'; }, 2000);
                }
            }
        }

        async function bgSync() {
            if(APP_URL.includes("script.google")) {
                fetch(APP_URL, { method:'POST', mode:'no-cors', body: JSON.stringify({action:'sync', state:state}) });
            }
        }
    </script>
</body>
</html>
