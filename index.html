<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TripTracker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Premium Theme Colors */
            --bg-color: #f1f5f9; /* Light Slate */
            --surface: #ffffff; /* Pure White */
            
            --primary: #005bc5; /* Deep Blue Action */
            --primary-hover: #004a9f;
            --accent: #0093cf; /* Bright Blue */
            --accent-light: #e0f2fe;
            
            --text-main: #0f172a; /* Very Dark Slate */
            --text-muted: #64748b; /* Gray Slate */
            --danger: #ef4444;
            --danger-light: #fef2f2;
            --success: #10b981;
            --success-light: #ecfdf5;
            --warning: #f59e0b;
            
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-float: 0 10px 25px -5px rgba(0, 91, 197, 0.3);
            
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-xl: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
            height: 100dvh;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- APP CONTAINER --- */
        .app-container {
            width: 100%; max-width: 420px; height: 100dvh;
            background: var(--bg-color);
            display: flex; flex-direction: column;
            position: relative; z-index: 10;
            box-shadow: var(--shadow-2xl);
        }

        /* Header */
        header {
            padding: 24px 24px 16px 24px;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg-color); z-index: 20;
        }
        header h1 { 
            font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; 
            color: var(--primary);
        }

        /* Sync Badge */
        .sync-badge {
            display: flex; align-items: center; gap: 6px;
            background: var(--surface);
            padding: 8px 14px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 600; color: var(--text-main);
            cursor: pointer; border: 1px solid var(--border);
            box-shadow: var(--shadow-sm); transition: all 0.2s;
        }
        .sync-badge:active { transform: scale(0.95); background: var(--border-light); }
        .sync-badge.syncing svg { animation: spin 1s linear infinite; color: var(--accent); }
        .sync-badge.done { background: var(--success-light); color: var(--success); border-color: #d1fae5; }
        .sync-badge.error { background: var(--danger-light); color: var(--danger); border-color: #fee2e2; }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Budget Card */
        .budget-wrapper {
            padding: 24px; background: var(--surface);
            border-radius: var(--radius-xl); margin: 0 20px 16px 20px; display: none;
            box-shadow: var(--shadow-md); border: 1px solid var(--border);
            animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .budget-header { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; margin-bottom: 6px; }
        .budget-amount { font-size: 2rem; font-weight: 800; color: var(--primary); margin-bottom: 20px; letter-spacing: -1px; }
        
        .budget-stats { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 12px; font-weight: 600; }
        .budget-stats .spent { color: var(--text-muted); }
        .budget-stats .spent span { color: var(--text-main); }
        .budget-stats .remaining { color: var(--text-muted); }
        .budget-stats .remaining span { color: var(--primary); }
        
        .progress-bg { width: 100%; height: 8px; background: var(--border-light); border-radius: 8px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--primary); border-radius: 8px; transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1); }

        /* Content Views */
        .content-view {
            flex: 1; overflow-y: auto; padding: 10px 20px 120px 20px; display: none;
            -ms-overflow-style: none; scrollbar-width: none;
        }
        .content-view::-webkit-scrollbar { display: none; }
        .content-view.active { display: block; animation: fadeScale 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeScale { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .section-title { font-size: 1.15rem; font-weight: 800; color: var(--text-main); margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Filter Row & Chips */
        .filter-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 12px; -ms-overflow-style: none; scrollbar-width: none; }
        .filter-row::-webkit-scrollbar { display: none; }
        .filter-chip { 
            padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; 
            background: var(--surface); border: 1px solid var(--border); color: var(--text-muted);
            cursor: pointer; white-space: nowrap; transition: all 0.2s; box-shadow: var(--shadow-sm);
        }
        .filter-chip.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 10px rgba(0,91,197,0.2); }
        
        .title-actions { display: flex; gap: 10px; align-items: center;}
        .undo-btn { font-size: 0.75rem; color: var(--primary); font-weight: 600; cursor: pointer; padding: 8px 14px; background: var(--accent-light); border-radius: 20px; display: none; transition: 0.2s;}
        .undo-btn:active { transform: scale(0.95); }
        .filter-icon-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 50%; width: 34px; height: 34px; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: var(--shadow-sm); color: var(--text-muted); transition: 0.2s; }
        .filter-icon-btn.active { color: var(--primary); border-color: var(--primary); background: var(--accent-light); }

        /* Item Rows */
        .item-row {
            background: var(--surface);
            padding: 16px 20px; border-radius: var(--radius-md); margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--shadow-sm); border: 1px solid var(--border);
            cursor: pointer; transition: all 0.2s ease;
        }
        .item-row:active { transform: scale(0.98); box-shadow: none; background: var(--border-light); }
        
        .item-row.done { opacity: 0.6; border-left: 4px solid var(--success); background: #f8fafc; }
        .item-row.done .item-title { text-decoration: line-through; color: var(--text-muted); }
        .item-row.not-found { border-left: 4px solid var(--danger); background: var(--danger-light); }
        
        .item-info { display: flex; flex-direction: column; gap: 6px; }
        .item-title { font-weight: 700; font-size: 0.95rem; color: var(--text-main); }
        .item-meta { font-size: 0.75rem; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
        .category-tag { background: var(--bg-color); padding: 4px 8px; border-radius: 6px; font-weight: 600; font-size: 0.7rem; border: 1px solid var(--border); color: var(--primary);}
        .item-price { font-weight: 800; color: var(--primary); font-size: 1.05rem; }

        /* FAB */
        .fab-add {
            position: absolute; bottom: 100px; right: 24px;
            width: 56px; height: 56px; background: var(--primary); color: #ffffff;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            box-shadow: var(--shadow-float); z-index: 20;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); cursor: pointer;
        }
        .fab-add:active { transform: scale(0.9); }

        /* Footer */
        footer {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 80px;
            background: var(--surface); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 30; padding-bottom: env(safe-area-inset-bottom);
        }
        
        .nav-tab {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-muted); font-size: 0.7rem; font-weight: 600; width: 70px; height: 100%;
            transition: color 0.3s; cursor: pointer;
        }
        .nav-tab.active { color: var(--primary); }
        .nav-tab svg { width: 22px; height: 22px; margin-bottom: 4px; fill: currentColor; transition: transform 0.3s; }
        .nav-tab.active svg { transform: translateY(-2px); }

        .center-btn-wrapper { position: relative; width: 64px; height: 64px; transform: translateY(-24px); }
        .center-action-btn {
            width: 100%; height: 100%; background: var(--surface);
            border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--primary); box-shadow: var(--shadow-md);
            border: 1px solid var(--border); transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); cursor: pointer;
        }
        .center-action-btn:active { transform: scale(0.9); }
        .center-action-btn.active-state { background: var(--primary); color: #ffffff; border-color: transparent; box-shadow: var(--shadow-float); }
        .center-action-btn span { font-weight: 800; font-size: 0.75rem; letter-spacing: 0.5px; }
        .center-action-btn svg { width: 24px; height: 24px; display: none; fill: currentColor; }

        /* --- MODALS --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 100;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        
        .modal-card {
            background: var(--surface); width: 90%; max-width: 350px; 
            border-radius: var(--radius-xl); padding: 28px 24px;
            transform: scale(0.95) translateY(10px); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: var(--shadow-lg); border: 1px solid var(--border);
        }
        .modal-overlay.open .modal-card { transform: scale(1) translateY(0); }
        
        .modal-title { font-size: 1.25rem; font-weight: 800; margin-bottom: 20px; color: var(--text-main); text-align: center; }
        .modal-message { font-size: 0.9rem; color: var(--text-muted); text-align: center; margin-bottom: 24px; line-height: 1.5; font-weight: 500;}
        
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px; }
        .form-control { 
            width: 100%; padding: 14px 16px; background: var(--bg-color); 
            border: 1px solid var(--border); border-radius: 12px; font-size: 1rem; color: var(--text-main);
            outline: none; transition: all 0.2s; font-weight: 500;
        }
        .form-control::placeholder { color: #94a3b8; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--accent-light); background: var(--surface); }
        
        select.form-control { appearance: none; background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%24%2024%22%20fill%3D%22none%22%20stroke%3D%22%2364748b%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 16px center; background-size: 16px; padding-right: 40px; }
        
        .modal-actions { display: flex; gap: 12px; margin-top: 28px; }
        .btn { 
            flex: 1; padding: 14px; border-radius: 12px; font-weight: 700; font-size: 0.95rem; 
            border: none; cursor: pointer; transition: all 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary); color: white; box-shadow: var(--shadow-sm); }
        .btn-danger { background: var(--danger); color: white; box-shadow: var(--shadow-sm); }
        .btn-outline { background: var(--surface); color: var(--text-main); border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
        .btn-small { padding: 10px 14px; font-size: 0.85rem; border-radius: 10px; background: var(--surface); color: var(--primary); border: 1px solid var(--border); width: auto; margin-top: 10px; box-shadow: var(--shadow-sm); font-weight: 700;}

        /* Bottom Sheet Options */
        .bottom-sheet {
            position: absolute; bottom: 0; background: var(--surface); width: 100%; max-width: 450px;
            border-radius: 24px 24px 0 0; padding: 24px; transform: translateY(100%); 
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1); border-top: 1px solid var(--border);
        }
        .modal-overlay.open .bottom-sheet { transform: translateY(0); }
        
        .sheet-opt { 
            padding: 16px 20px; border-radius: 14px; margin-bottom: 12px; font-weight: 600; font-size: 0.95rem;
            display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.2s;
            border: 1px solid var(--border); background: var(--surface); color: var(--text-main);
            box-shadow: var(--shadow-sm);
        }
        .sheet-opt:active { transform: scale(0.98); background: var(--border-light); }
        .sheet-opt.opt-done { color: var(--success); background: var(--success-light); border-color: #d1fae5; }
        .sheet-opt.opt-fail { color: var(--danger); background: var(--danger-light); border-color: #fee2e2; }
        
        /* Toast Notifications */
        .toast-container {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: var(--text-main); color: var(--surface); font-weight: 600; font-size: 0.9rem;
            padding: 14px 24px; border-radius: 30px; box-shadow: var(--shadow-lg);
            display: flex; align-items: center; gap: 10px; z-index: 200; border: none;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease; opacity: 0;
        }
        .toast-container.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast-icon { width: 20px; height: 20px; }
        .toast-success .toast-icon { color: var(--success); }
        .toast-warning .toast-icon { color: var(--warning); }
        .toast-error .toast-icon { color: var(--danger); }

        .empty-state { text-align: center; color: var(--text-muted); padding: 60px 20px; font-size: 0.95rem; font-weight: 500; }
        
        /* Details List for History Popup */
        .detail-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 0; border-bottom: 1px solid var(--border);
            font-size: 0.85rem; color: var(--text-main);
        }
        .detail-item:last-child { border-bottom: none; }
        .detail-price { font-weight: 800; color: var(--primary); font-size: 0.95rem;}
    </style>
</head>
<body>

    <!-- TOAST NOTIFICATION -->
    <div class="toast-container" id="toast">
        <svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path id="toastIconPath" d=""/></svg>
        <span id="toastMsg">Notification</span>
    </div>

    <!-- UI STRUCTURE -->
    <div class="app-container">
        
        <!-- Header -->
        <header>
            <h1>TripTracker Pro</h1>
            <div class="sync-badge" id="syncBadge" onclick="syncWithCloud(false)">
                <svg id="syncIconSvg" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"/></svg>
                <span id="syncText">Sync</span>
            </div>
        </header>

        <!-- Premium Budget Progress Card -->
        <div class="budget-wrapper" id="budgetBar">
            <div class="budget-header">Available Balance</div>
            <div class="budget-amount" id="remLbl">Rs. 0</div>
            <div class="budget-stats">
                <span class="spent">Spent: <span id="spentLbl">Rs. 0</span></span>
                <span class="remaining">Total: <span id="totalLbl">Rs. 0</span></span>
            </div>
            <div class="progress-bg"><div class="progress-fill" id="progFill"></div></div>
        </div>

        <!-- VIEW: List of Items -->
        <div class="content-view active" id="view-list">
            <div class="section-title">
                <span>Purchase List</span>
                <div class="title-actions">
                    <span class="undo-btn" id="undoBtn" onclick="undoAction()">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" style="display:inline-block; vertical-align:middle; margin-right:2px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" transform="rotate(-90 12 12)"></path></svg>
                        Undo
                    </span>
                    <div class="filter-icon-btn" id="filterToggleBtn" onclick="toggleFilters()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                    </div>
                </div>
            </div>
            
            <!-- Category Filter Row -->
            <div class="filter-row" id="filterRow" style="display: none;">
                <!-- Filter chips injected here -->
            </div>

            <div id="listContainer"></div>
        </div>

        <!-- VIEW: History of Trips -->
        <div class="content-view" id="view-history">
            <div class="section-title">Trip History</div>
            <div id="historyContainer"></div>
        </div>

        <!-- Floating Add Item Button -->
        <div class="fab-add" id="fabAdd" onclick="openModal('addModal')">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </div>

        <!-- Footer Tab Navigation -->
        <footer>
            <div class="nav-tab active" data-view="list" onclick="switchTab('list')">
                <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
                <span>Items</span>
            </div>
            
            <div class="center-btn-wrapper">
                <div class="center-action-btn" id="mainBtn" onclick="handleMainAction()">
                    <span id="mainBtnTxt">START</span>
                    <svg id="mainBtnIco" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                </div>
            </div>
            
            <div class="nav-tab" data-view="history" onclick="switchTab('history')">
                <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <span>History</span>
            </div>
        </footer>
    </div>

    <!-- MODALS -->
    
    <!-- Add Item Modal -->
    <div class="modal-overlay" id="addModal">
        <div class="modal-card">
            <h3 class="modal-title">Add New Item</h3>
            <div class="form-group">
                <label class="form-label">Item Name</label>
                <input type="text" id="addInp" class="form-control" placeholder="e.g. Printer Ink, Display...">
            </div>
            <div class="form-group">
                <label class="form-label">Category</label>
                <select id="addCatInp" class="form-control">
                    <!-- Categories injected here -->
                </select>
                <button class="btn btn-small" onclick="openModal('categoryModal'); closeModal('addModal');">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    New Category
                </button>
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeModal('addModal')">Cancel</button>
                <button class="btn btn-primary" onclick="addItem()">Add to List</button>
            </div>
        </div>
    </div>

    <!-- Add Category Modal -->
    <div class="modal-overlay" id="categoryModal">
        <div class="modal-card">
            <h3 class="modal-title">New Category</h3>
            <div class="form-group">
                <label class="form-label">Category Name</label>
                <input type="text" id="newCatInp" class="form-control" placeholder="e.g. Mobile Repair...">
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeModal('categoryModal'); openModal('addModal');">Back</button>
                <button class="btn btn-primary" onclick="addCategory()">Save Category</button>
            </div>
        </div>
    </div>

    <!-- Start Journey Modal -->
    <div class="modal-overlay" id="startModal">
        <div class="modal-card">
            <h3 class="modal-title">Start Trip</h3>
            <div class="form-group">
                <label class="form-label">Total Budget Available (Rs.)</label>
                <input type="number" id="startInp" class="form-control" placeholder="Amount in Rs.">
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeModal('startModal')">Cancel</button>
                <button class="btn btn-primary" onclick="startTrip()">Begin Tracking</button>
            </div>
        </div>
    </div>

    <!-- Log Expense Modal -->
    <div class="modal-overlay" id="expModal">
        <div class="modal-card">
            <h3 class="modal-title" id="expTitle">Log Expense</h3>
            <div class="form-group" id="expRsnGroup" style="display:none;">
                <label class="form-label">Expense Reason</label>
                <input type="text" id="expRsn" class="form-control" placeholder="e.g. Tuk Tuk, Lunch...">
            </div>
            <div class="form-group" id="expCatGroup" style="display:none;">
                <label class="form-label">Category</label>
                <select id="expCatInp" class="form-control"></select>
            </div>
            <div class="form-group">
                <label class="form-label">Amount Spent (Rs.)</label>
                <input type="number" id="expAmt" class="form-control" placeholder="Amount">
            </div>
            <div class="form-group">
                <label class="form-label">Notes (Optional)</label>
                <input type="text" id="expNote" class="form-control" placeholder="Shop name, remarks...">
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeModal('expModal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveExpense()">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Custom Warning Confirmation Alert Modal -->
    <div class="modal-overlay" id="alertModal">
        <div class="modal-card">
            <h3 class="modal-title" id="alertTitle">Alert</h3>
            <p class="modal-message" id="alertMsg">Message</p>
            <div class="modal-actions" id="alertActions"></div>
        </div>
    </div>

    <!-- History Detailed Popup Modal -->
    <div class="modal-overlay" id="historyDetailModal">
        <div class="modal-card" style="max-width: 380px;">
            <h3 class="modal-title" id="historyDetailTitle" style="margin-bottom: 5px;">Trip Details</h3>
            <p style="text-align: center; color: var(--text-muted); font-weight:600; font-size: 0.8rem; margin-bottom: 20px;" id="historyDetailSub">Date Time Info</p>
            <div id="historyDetailContent" style="max-height: 50vh; overflow-y: auto; padding-right: 5px; margin-bottom: 20px;">
                <!-- Detailed items will be injected here -->
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeModal('historyDetailModal')">Close</button>
            </div>
        </div>
    </div>

    <!-- Bottom Sheet Operations -->
    <div class="modal-overlay" id="sheetModal" onclick="closeModal('sheetModal')">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <h3 class="modal-title" id="sheetTitle" style="margin-bottom:24px;">Item Options</h3>
            <div class="sheet-opt opt-done" onclick="handleItemAction('done')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                Mark as Purchased
            </div>
            <div class="sheet-opt opt-fail" onclick="handleItemAction('notfound')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                Mark Not Found
            </div>
            <div class="sheet-opt" onclick="closeModal('sheetModal')" style="justify-content: center; background: transparent; border-color: var(--border);">
                Cancel
            </div>
        </div>
    </div>

    <script>
        // Apps Script configuration - Cloud connection API
        const APP_URL = "https://script.google.com/macros/s/AKfycbzYCrEDOV_W9ZoMPGOjF9u3qMvVeeqyKDV7Irkm0us1VaW2QjRTduEsUvdJa8EhQQam4A/exec";

        // Application state management
        let state = { 
            started: false, 
            budget: 0, 
            spent: 0, 
            items: [], 
            history: [], 
            categories: [], // FIX: Start empty as requested (No Samples)
            lastSync: 0, 
            lastAction: null 
        };
        
        let activeId = null; 
        let isCustom = false; 
        let pressTimer;
        let activeFilter = 'All';

        // --- NOTIFICATION & MODAL ANIMATION ---
        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.className = `toast-container toast-${type}`;
            
            const path = document.getElementById('toastIconPath');
            if(type === 'success') path.setAttribute('d', 'M20 6L9 17l-5-5');
            else if(type === 'warning') path.setAttribute('d', 'M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z');
            else path.setAttribute('d', 'M18 6L6 18M6 6l12 12');

            void toast.offsetWidth; // Reflow reset
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function showAlert(title, msg, type = 'alert', onConfirm = null) {
            document.getElementById('alertTitle').innerText = title;
            document.getElementById('alertMsg').innerText = msg;
            const actions = document.getElementById('alertActions');
            actions.innerHTML = '';

            if(type === 'confirm') {
                actions.innerHTML = `
                    <button class="btn btn-outline" onclick="closeModal('alertModal')">Cancel</button>
                    <button class="btn btn-danger" id="confirmBtn">Confirm</button>
                `;
                document.getElementById('confirmBtn').onclick = () => { closeModal('alertModal'); if(onConfirm) onConfirm(); };
            } else {
                actions.innerHTML = `<button class="btn btn-primary" onclick="closeModal('alertModal')">OK</button>`;
            }
            openModal('alertModal');
        }

        // --- RENDER & STORAGE ---
        window.onload = () => {
            if(localStorage.getItem('clmb_pro_data')) {
                let saved = JSON.parse(localStorage.getItem('clmb_pro_data'));
                state = { ...state, ...saved };
                // FIX: Ensure categories is ALWAYS an array to prevent .includes() error
                if(!state.categories || !Array.isArray(state.categories)) {
                    state.categories = [];
                }
            }
            render();
            updateCategoryDropdowns();
            renderFilters();
            
            const mBtn = document.getElementById('mainBtn');
            mBtn.addEventListener('touchstart', pressStart, {passive: true});
            mBtn.addEventListener('touchend', pressEnd);
            mBtn.addEventListener('mousedown', pressStart);
            mBtn.addEventListener('mouseup', pressEnd);
            mBtn.addEventListener('mouseleave', pressEnd);

            // AUTO SYNC TRIGGER
            window.addEventListener('online', () => {
                showToast("Connected to Internet. Syncing...");
                syncWithCloud(true);
            });
            syncWithCloud(true);
        }

        function saveLocal() {
            state.lastSync = Date.now();
            localStorage.setItem('clmb_pro_data', JSON.stringify(state));
            render(); 
            bgSync(); 
        }

        function updateCategoryDropdowns() {
            const addCat = document.getElementById('addCatInp');
            const expCat = document.getElementById('expCatInp');
            let options = state.categories.map(c => `<option value="${c}">${c}</option>`).join('');
            if(!options) options = `<option value="" disabled selected>No categories available</option>`;
            addCat.innerHTML = options;
            expCat.innerHTML = options;
        }

        // --- NEW: FILTER LOGIC ---
        function toggleFilters() {
            const row = document.getElementById('filterRow');
            const btn = document.getElementById('filterToggleBtn');
            if(row.style.display === 'none') {
                row.style.display = 'flex';
                btn.classList.add('active');
            } else {
                row.style.display = 'none';
                btn.classList.remove('active');
                if(activeFilter !== 'All') setFilter('All');
            }
        }

        function renderFilters() {
            const row = document.getElementById('filterRow');
            let html = `<div class="filter-chip ${activeFilter === 'All' ? 'active' : ''}" onclick="setFilter('All')">All</div>`;
            state.categories.forEach(c => {
                html += `<div class="filter-chip ${activeFilter === c ? 'active' : ''}" onclick="setFilter('${c}')">${c}</div>`;
            });
            row.innerHTML = html;
        }

        function setFilter(cat) {
            activeFilter = cat;
            renderFilters();
            render();
        }

        function addCategory() {
            const newCat = document.getElementById('newCatInp').value.trim();
            if(!state.categories) state.categories = []; // Safety check
            
            if(newCat && !state.categories.includes(newCat)) {
                state.categories.push(newCat);
                updateCategoryDropdowns();
                renderFilters();
                document.getElementById('newCatInp').value = '';
                closeModal('categoryModal');
                openModal('addModal');
                
                // Set the newly created category as selected
                const addCatDropdown = document.getElementById('addCatInp');
                addCatDropdown.value = newCat; 
                
                saveLocal();
                showToast('Category added successfully');
            } else if (state.categories.includes(newCat)) {
                showAlert("Warning", "Category already exists.");
            }
        }

        function render() {
            const bb = document.getElementById('budgetBar');
            if(state.started) {
                bb.style.display = 'block';
                const rem = state.budget - state.spent;
                document.getElementById('spentLbl').innerText = `Rs. ${state.spent.toLocaleString()}`;
                document.getElementById('totalLbl').innerText = `Rs. ${state.budget.toLocaleString()}`;
                document.getElementById('remLbl').innerText = `Rs. ${rem.toLocaleString()}`;
                document.getElementById('progFill').style.width = Math.max(0, (rem/state.budget)*100) + '%';
                
                document.getElementById('mainBtnTxt').style.display = 'none';
                document.getElementById('mainBtnIco').style.display = 'block';
                document.getElementById('mainBtn').classList.add('active-state');
            } else {
                bb.style.display = 'none';
                document.getElementById('mainBtnTxt').style.display = 'block';
                document.getElementById('mainBtnIco').style.display = 'none';
                document.getElementById('mainBtn').classList.remove('active-state');
            }

            const lc = document.getElementById('listContainer');
            lc.innerHTML = '';
            
            // Filter & Sort
            let filteredList = state.items;
            if(activeFilter !== 'All') {
                filteredList = state.items.filter(i => i.category === activeFilter);
            }

            const sortedList = [...filteredList].sort((a,b) => {
                const w = { 'pending':1, 'not-found':2, 'done':3 };
                return w[a.status] - w[b.status];
            });

            sortedList.forEach(i => {
                const timeIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="margin-right:2px; vertical-align:text-bottom;"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`;
                const statusStr = i.status === 'not-found' ? 'Not Found' : (i.time ? `${timeIcon}${i.time}` : 'Pending');
                
                lc.innerHTML += `
                    <div class="item-row ${i.status}" onclick="openItem(${i.id})">
                        <div class="item-info">
                            <div class="item-title">${i.title}</div>
                            <div class="item-meta">
                                <span class="category-tag">${i.category || 'General'}</span>
                                <span>${statusStr}</span>
                            </div>
                        </div>
                        ${i.price ? `<div class="item-price">Rs. ${i.price.toLocaleString()}</div>` : ''}
                    </div>`;
            });
            if(!sortedList.length) {
                lc.innerHTML = activeFilter !== 'All' 
                    ? `<div class="empty-state">No items found in ${activeFilter}.</div>`
                    : `<div class="empty-state">Your list is empty.<br>Tap the + button to add items.</div>`;
            }

            document.getElementById('undoBtn').style.display = state.lastAction ? 'block' : 'none';

            // History rendering
            const hc = document.getElementById('historyContainer');
            hc.innerHTML = '';
            [...state.history].reverse().forEach((h, idx) => {
                const originalIndex = state.history.length - 1 - idx;
                hc.innerHTML += `
                    <div class="item-row" style="flex-direction:column; align-items:flex-start; cursor:pointer;" onclick="showHistoryDetails(${originalIndex})">
                        <div style="width:100%; display:flex; justify-content:space-between; margin-bottom:8px; align-items:center;">
                            <div style="display:flex; align-items:center; gap:6px;">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="3" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                <span style="font-weight:700; font-size:0.95rem; color:var(--text-main);">${h.date}</span>
                            </div>
                            <span style="color:var(--primary); font-weight:800;">Rs. ${(h.budget - h.spent).toLocaleString()}</span>
                        </div>
                        <div style="font-size:0.75rem; color:var(--text-muted); display:flex; justify-content:space-between; width:100%; font-weight:600;">
                            <span>Spent: Rs. ${h.spent.toLocaleString()}</span>
                            <span>Items: ${h.items} (Tap to view)</span>
                        </div>
                    </div>`;
            });
            if(!state.history.length) hc.innerHTML = '<div class="empty-state">No trip history available.</div>';
        }

        // --- HISTORY DETAILS POPUP LOGIC ---
        function showHistoryDetails(index) {
            const trip = state.history[index];
            document.getElementById('historyDetailTitle').innerText = `Trip Summary`;
            document.getElementById('historyDetailSub').innerText = `${trip.date} • Start: Rs. ${trip.budget.toLocaleString()}`;
            
            let content = '';
            
            if (trip.fullData && trip.fullData.length > 0) {
                trip.fullData.forEach(item => {
                    const isPurchased = item.status === 'done';
                    
                    let statusIcon = isPurchased 
                        ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"></polyline></svg>` 
                        : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
                    
                    const priceText = isPurchased ? `Rs. ${item.price.toLocaleString()}` : '-';
                    const priceColor = isPurchased ? 'var(--primary)' : 'var(--text-muted)';
                    
                    content += `
                        <div class="detail-item">
                            <div style="display:flex; flex-direction:column; gap:4px;">
                                <div style="display:flex; align-items:center; gap:8px;">
                                    ${statusIcon}
                                    <span style="color:${isPurchased ? 'var(--text-main)' : 'var(--text-muted)'}; font-weight:700;">${item.title}</span>
                                </div>
                                <span style="font-size:0.7rem; color:var(--text-muted); margin-left:24px; font-weight:500;">
                                    ${item.category || 'General'} ${item.time ? `• ${item.time}` : ''} ${item.note ? `• ${item.note}` : ''}
                                </span>
                            </div>
                            <span class="detail-price" style="color: ${priceColor};">${priceText}</span>
                        </div>
                    `;
                });
            } else {
                content = '<div class="empty-state" style="padding: 20px;">No records for this trip.</div>';
            }
            
            content += `
                <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); display:flex; justify-content:space-between;">
                    <span style="color:var(--text-muted); font-weight:700; font-size:0.85rem;">Total Spent</span>
                    <span style="color:var(--danger); font-weight:800; font-size:1.1rem;">Rs. ${trip.spent.toLocaleString()}</span>
                </div>
            `;
            
            document.getElementById('historyDetailContent').innerHTML = content;
            openModal('historyDetailModal');
        }

        // --- NAVIGATION ROUTER ---
        function switchTab(v) {
            document.querySelectorAll('.content-view').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(e => e.classList.remove('active'));
            
            const targetView = document.getElementById('view-' + v);
            if(targetView) targetView.classList.add('active');
            
            const targetTab = document.querySelector(`.nav-tab[data-view="${v}"]`);
            if(targetTab) targetTab.classList.add('active');
            
            const fab = document.getElementById('fabAdd');
            if(fab) fab.style.display = (v === 'list') ? 'flex' : 'none';
        }

        function openModal(id) { document.getElementById(id).classList.add('open'); }
        function closeModal(id) { document.getElementById(id).classList.remove('open'); }

        function addItem() {
            const v = document.getElementById('addInp').value.trim();
            const cat = document.getElementById('addCatInp').value;
            if(!v) return;
            state.items.push({ id:Date.now(), title:v, category:cat || '', status:'pending', price:0, time:'', note:'' });
            document.getElementById('addInp').value = ''; 
            closeModal('addModal'); saveLocal();
            showToast('Item added to list');
        }

        function handleMainAction() {
            if(!state.started) openModal('startModal');
            else {
                isCustom = true;
                document.getElementById('expTitle').innerText = 'Log Extra Expense';
                document.getElementById('expRsnGroup').style.display = 'block';
                document.getElementById('expCatGroup').style.display = 'block';
                document.getElementById('expAmt').value = ''; 
                document.getElementById('expRsn').value = '';
                document.getElementById('expNote').value = '';
                openModal('expModal');
            }
        }

        function startTrip() {
            const b = parseInt(document.getElementById('startInp').value);
            if(!b || b <= 0) { showAlert("Warning", "Please enter a valid budget amount."); return; }
            state.budget = b; state.spent = 0; state.started = true;
            closeModal('startModal'); saveLocal();
            showToast('Trip successfully started!', 'success');
        }

        function openItem(id) {
            activeId = id; const i = state.items.find(x=>x.id==id);
            document.getElementById('sheetTitle').innerText = i.title;
            openModal('sheetModal');
        }

        function handleItemAction(act) {
            closeModal('sheetModal');
            if(act==='done') {
                isCustom = false;
                document.getElementById('expTitle').innerText = 'Purchase Details';
                document.getElementById('expRsnGroup').style.display = 'none';
                document.getElementById('expCatGroup').style.display = 'none'; // Cat already set
                document.getElementById('expAmt').value = '';
                document.getElementById('expNote').value = '';
                openModal('expModal');
            } else {
                state.lastAction = JSON.parse(JSON.stringify(state));
                state.items.find(x=>x.id==activeId).status = 'not-found';
                saveLocal(); showToast('Marked as Not Found', 'warning');
            }
        }

        function saveExpense() {
            const amt = parseInt(document.getElementById('expAmt').value);
            const note = document.getElementById('expNote').value.trim();
            if(!amt || amt <= 0) { showToast('Enter valid amount', 'error'); return; }
            
            state.lastAction = JSON.parse(JSON.stringify(state));
            state.spent += amt;
            let timeStr = new Date().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});

            if(!isCustom) {
                let itm = state.items.find(x=>x.id==activeId);
                itm.status = 'done'; itm.price = amt; itm.time = timeStr; itm.note = note;
                showToast(`Saved Rs. ${amt} for ${itm.title}`);
            } else {
                let rsn = document.getElementById('expRsn').value || 'Extra Expense';
                let cat = document.getElementById('expCatInp').value || '';
                state.items.push({ id:Date.now(), title:rsn, category:cat, status:'done', price:amt, time:timeStr, note:note });
                showToast(`Logged Rs. ${amt} for ${rsn}`);
            }
            closeModal('expModal'); saveLocal();
        }

        function undoAction() {
            if(state.lastAction) {
                state = JSON.parse(JSON.stringify(state.lastAction));
                state.lastAction = null;
                saveLocal(); showToast('Action reversed successfully', 'success');
            }
        }

        // Long Press to complete trip
        function pressStart(e) { if(!state.started) return; pressTimer = setTimeout(triggerEndTrip, 1000); }
        function pressEnd() { clearTimeout(pressTimer); }
        
        function triggerEndTrip() {
            showAlert("End Trip", "Are you sure you want to end this trip? The details will be saved to history.", "confirm", finalizeTrip);
        }

        function finalizeTrip() {
            let dStr = new Date().toLocaleDateString('en-GB');
            let doneCount = state.items.filter(x=>x.status=='done').length;
            let tripDataArr = state.items.filter(x=>x.status=='done' || x.status=='not-found');
            
            // Format date for display in history
            let tripData = {
                id: Date.now(),
                date: dStr, 
                budget: state.budget, 
                spent: state.spent, 
                items: doneCount,
                fullData: tripDataArr
            };
            state.history.push(tripData);
            
            // Push Flat data array for Google Sheet "Expenses" Tab logic
            if(APP_URL.includes("script.google")) {
                let expensesPayload = tripDataArr.map(item => ({
                    tripId: tripData.id,
                    date: dStr,
                    time: item.time,
                    item: item.title,
                    category: item.category || 'General',
                    price: item.price,
                    status: item.status,
                    note: item.note
                }));

                fetch(APP_URL, { 
                    method:'POST', 
                    mode:'no-cors', 
                    body: JSON.stringify({
                        action:'end', 
                        summary: { date: dStr, budget: state.budget, spent: state.spent, balance: state.budget - state.spent },
                        expenses: expensesPayload
                    }) 
                }).catch(err => console.log("Google Sheets update failed", err));
            }

            state.started = false; state.lastAction = null;
            state.items = state.items.filter(x=>x.status!=='done'); // Keep pending items
            saveLocal(); 
            showToast('Trip successfully finished!', 'success');
        }

        // --- TWO-WAY SYNC SYSTEM ---
        async function syncWithCloud(silent = false) {
            if(!APP_URL.includes("script.google")) {
                if(!silent) showAlert("Setup Required", "Please configure the Google Apps Script URL.");
                return;
            }
            const b = document.getElementById('syncBadge'); 
            const txt = document.getElementById('syncText');
            const icon = document.getElementById('syncIconSvg');
            
            if(!silent) { b.className = 'sync-badge syncing'; txt.innerText = 'Syncing...'; }
            
            try {
                let res = await fetch(APP_URL);
                let json = await res.json();
                
                if(json.state && json.state.lastSync > state.lastSync) {
                    state = json.state; 
                    
                    // FIX: Double-check categories array after downloading from cloud
                    if(!state.categories || !Array.isArray(state.categories)) {
                        state.categories = [];
                    }
                    
                    localStorage.setItem('clmb_pro_data', JSON.stringify(state)); 
                    updateCategoryDropdowns();
                    renderFilters();
                    render();
                } else if (!json.state || state.lastSync > json.state.lastSync) { 
                    await bgSync(); 
                }
                
                if(!silent) {
                    b.className = 'sync-badge done'; txt.innerText = 'Done';
                    icon.innerHTML = '<polyline points="20 6 9 17 4 12"></polyline>';
                    setTimeout(()=>{ 
                        b.className='sync-badge'; txt.innerText='Sync'; 
                        icon.innerHTML = '<path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"/>';
                    }, 2000);
                }
            } catch(e) { 
                if(!silent) {
                    b.className = 'sync-badge error'; txt.innerText = 'Failed';
                    icon.innerHTML = '<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>';
                    setTimeout(()=>{ 
                        b.className='sync-badge'; txt.innerText='Sync'; 
                        icon.innerHTML = '<path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"/>';
                    }, 2000);
                }
            }
        }

        async function bgSync() {
            if(APP_URL.includes("script.google")) {
                fetch(APP_URL, { 
                    method:'POST', 
                    mode:'no-cors', 
                    body: JSON.stringify({action:'sync', state:state}) 
                }).catch(err => console.log("Background silent sync failed", err));
            }
        }
    </script>
</body>
</html>
